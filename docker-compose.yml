version: '3.9'

services:
  api:
    build:
      context: .
      target: production
    container_name: gigflow_api
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/gigflow
      REDIS_HOST: redis
      REDIS_PORT: 6379
    env_file:
      - .env
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gigflow_net
    volumes:
      - logs:/app/logs

  mongo:
    image: mongo:7.0
    container_name: gigflow_mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gigflow_net

  redis:
    image: redis:7.2-alpine
    container_name: gigflow_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - gigflow_net

  nginx:
    image: nginx:1.25-alpine
    container_name: gigflow_nginx
    restart: unless-stopped
    ports:
      - '80:80'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - gigflow_net

volumes:
  mongo_data:
  redis_data:
  logs:

networks:
  gigflow_net:
    driver: bridge
